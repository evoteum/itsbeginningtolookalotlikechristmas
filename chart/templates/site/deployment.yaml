apiVersion: apps/v1
kind: Deployment
metadata:
  name: site
spec:
  replicas: {{ .Values.site.replicaCount }}
  selector:
    matchLabels:
      app: site
  template:
    metadata:
      labels:
        app: site
    spec:
      securityContext:
        runAsNonRoot: true
      volumes:
        - name: site-content
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      initContainers:
        - name: git-sync-init
          image: {{ .Values.site.gitSync.image.repository }}:{{ .Values.site.gitSync.image.tag }}
          args:
            - --repo={{ .Values.site.gitSync.repo }}
            - --root=/data
            - --link=current
            - --depth=1
            - --one-time
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: site-content
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      containers:
        - name: nginx
          image: {{ .Values.site.nginx.image.repository }}:{{ .Values.site.nginx.image.tag }}
          ports:
            - containerPort: 8080
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: site-content
              mountPath: /data
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
        - name: git-sync
          image: {{ .Values.site.gitSync.image.repository }}:{{ .Values.site.gitSync.image.tag }}
          args:
            - --repo={{ .Values.site.gitSync.repo }}
            - --root=/data
            - --link=current
            - --depth=1
            - --period={{ .Values.site.gitSync.period }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: site-content
              mountPath: /data
            - name: tmp
              mountPath: /tmp
