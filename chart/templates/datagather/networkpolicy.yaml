apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: datagather
spec:
  podSelector:
    matchLabels:
      app: datagather
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - ports:
        - port: 53
          protocol: UDP
    - ports:
        - port: 443
          protocol: TCP
