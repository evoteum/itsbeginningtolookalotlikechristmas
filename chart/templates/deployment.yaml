apiVersion: apps/v1
kind: Deployment
metadata:
  name: itsbeginningtolookalotlikechristmas
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: itsbeginningtolookalotlikechristmas
  template:
    metadata:
      labels:
        app: itsbeginningtolookalotlikechristmas
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: itsbeginningtolookalotlikechristmas
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: 8080
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
